name: Deploy to Server

on:
  push:
    branches: [ main ]  # pokreće se svaki put kad pushuješ na main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: davidobradovic/arenamotorsba:latest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}  # koristi privatni ključ
          script: |
            docker pull davidobradovic/arenamotorsba:latest
            docker stop arenamotorsba || true
            docker rm arenamotorsba || true
            docker run -d --name arenamotorsba -p 2891:3000 davidobradovic/arenamotorsba:latest
